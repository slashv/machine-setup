set-option -g default-terminal "screen-256color"
set-option -sg escape-time 10
set-option -g focus-events on
setw -g aggressive-resize on
set -g mouse on
set -g status-style bg=default
set -g allow-passthrough on
set -g set-clipboard on

unbind C-b
set-option -g prefix C-f
bind-key C-f send-prefix

bind n new-window
bind i next-window
bind u previous-window

unbind -n C-d
bind d kill-pane

bind t split-window -h
bind g split-window -v
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind M-f
bind -n M-f resize-pane -Z

bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

unbind C-h

if-shell 'command -v pbcopy >/dev/null 2>&1' 'bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v xclip >/dev/null 2>&1' 'bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
